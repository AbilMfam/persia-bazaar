name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip persia-bazaar-main-git.zip
          cp -r persia-bazaar-main/. .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build:mobile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix repositories in all gradle files
        run: |
          # حذف کامل مخازن Aliyun و جایگزینی با مخازن رسمی
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/central" }|mavenCentral()|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/google" }|google()|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/public" }|mavenCentral()|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|maven { url "https://maven.aliyun.com/repository/jcenter" }|maven { url "https://jcenter.bintray.com" }|g' {} \;
          find android -name "*.gradle" -type f -exec sed -i 's|aliyun|google|g' {} \;

      - name: Override build.gradle files
        run: |
          # اصلاح فایل build.gradle اصلی پروژه
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

          # اصلاح فایل build.gradle اپلیکیشن
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace 'com.yourpackage.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.yourpackage.app"
                  minSdk 22
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation project(':capacitor-android')
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Fix duplicate splash resource
        run: rm -f android/app/src/main/res/drawable/splash.png

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
