# Android APK CI
#
# VITE_API_BASE_URL (recommended for push to main): set in
# Repository → Settings → Secrets and variables → Actions → Variables
# Example: https://diigiimall.ir/api (optional if .env.production is committed).
#
# workflow_dispatch defaults the API URL via input when that variable is empty.
#
# ─── Future: Play Store release signing ───────────────────────────────────────
# 1. Add GitHub Secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#    ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD (or one combined secret blob).
# 2. Decode keystore in the Gradle step; add signingConfigs.release in
#    android/app/build.gradle (often via env vars keyed from secrets).
# 3. Add another job or switch apk_variant release + ./gradlew bundleRelease.

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      vite_api_base_url:
        description: >
          API base URL — HTTPS and must end with /api. On manual runs, used when the
          repository Actions variable `VITE_API_BASE_URL` is empty; otherwise the repo
          variable wins. Leaving this empty falls back to the production default below.
        required: false
        default: "https://diigiimall.ir/api"
      apk_variant:
        description: >
          Debug for CI artifacts; release unsigned APK requires Android signing
          config (bundleRelease/signingConfigs) before production rollout.
        required: false
        type: choice
        options: [debug, release]
        default: debug

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Resolve VITE_API_BASE_URL
        env:
          REPO_VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          DISPATCH_URL: ${{ github.event.inputs.vite_api_base_url }}
        run: |
          set -euo pipefail
          DEFAULT_API="https://diigiimall.ir/api"
          FINAL=""

          if [ -n "${REPO_VITE_API_BASE_URL// }" ]; then
            FINAL="${REPO_VITE_API_BASE_URL// }"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            FINAL="${DISPATCH_URL// }"
          else
            # Push / schedule: مخزن باید `.env.production` داشته باشد؛ بدون آن از دامنهٔ canonical استفاده کن.
            FINAL="$DEFAULT_API"
          fi

          if [ -z "$FINAL" ]; then
            FINAL="$DEFAULT_API"
          fi

          NORM="${FINAL%/}"
          if [[ ! "${NORM,,}" =~ ^https:// ]]; then
            echo "::error::VITE_API_BASE_URL must use HTTPS (Capacitor has cleartext disabled). Got: ${FINAL}"
            exit 1
          fi
          if [[ ! "${NORM,,}" =~ /api$ ]]; then
            echo "::error::VITE_API_BASE_URL must include Laravel's /api prefix and end with /api (got: ${FINAL})"
            exit 1
          fi

          echo "Resolved VITE_API_BASE_URL=${NORM}"
          echo "VITE_API_BASE_URL=${NORM}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build web (Capacitor / Vite mobile)
        run: npm run build:mobile

      - name: Verify API URL embedded in Capacitor web bundle
        run: |
          set -euo pipefail
          if ! grep -R "diigiimall\.ir" dist/client --include='*.js' >/dev/null 2>&1; then
            echo "::error::Expected https://diigiimall.ir in built JS assets (check VITE_API_BASE_URL)."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Resolve APK variant / Gradle task
        env:
          DISPATCH_VARIANT: ${{ github.event.inputs.apk_variant }}
        id: apk
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            VARIANT="debug"
          else
            VARIANT="${DISPATCH_VARIANT:-debug}"
            if [ -z "${VARIANT}" ]; then
              VARIANT="debug"
            fi
          fi
          case "$VARIANT" in
            debug)
              echo "task=assembleDebug" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::apk_variant must be debug or release; got '$VARIANT'"
              exit 1
              ;;
          esac
          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Gradle ${{ steps.apk.outputs.task }})
        run: |
          set -euo pipefail
          cd android
          sed -i 's/\r//' gradlew
          chmod +x gradlew
          ./gradlew "${{ steps.apk.outputs.task }}"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: digimall-${{ steps.apk.outputs.variant }}-${{ github.run_number }}
          path: android/app/build/outputs/apk/${{ steps.apk.outputs.variant }}/*.apk
